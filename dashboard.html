<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC Products</title>

<style>
/* ---------- GLOBAL ---------- */
body {
    margin: 0;
    font-family: "Times New Roman", serif;
    background: #f4f4f4;
}

a {
    text-decoration: none;
    color: white;
}

/* ---------- TOP NAVBAR ---------- */
.navbar {
    background: #13295b;
    padding: 10px 0;
}

.navbar ul {
    list-style: none;
    display: flex;
    justify-content: left;
    margin: 0;
    padding: 0;
}

.navbar li {
    margin: 0 20px;
}

/* ---------- LAYOUT ---------- */
.container {
    display: flex;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
    width: 220px;
    background: #ff7f1a;
    color: black;
    padding-bottom: 20px;
}

.sidebar h3 {
    padding: 15px;
    margin: 0;
    background: #ff7f1a;
}

.sidebar ul {
    list-style: none;
    padding: 0;
}

.sidebar li {
    padding: 10px 15px;
    border-bottom: 1px solid rgba(0,0,0,0.2);
}

/* ---------- MAIN CONTENT ---------- */
.content {
    flex: 1;
    padding: 20px;
    background: white;
}

.content h2 {
    border-bottom: 2px solid #ccc;
    padding-bottom: 10px;
}

/* ---------- PRODUCTS GRID ---------- */
.products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 20px;
}

.product {
    text-align: center;
}

.product img {
    width: 100%;
    max-width: 200px;
    height: auto;
}

/* ---------- FOOTER ---------- */
.footer {
    background: #13295b;
    color: white;
    text-align: center;
    padding: 10px;
}

/* ---------- MOBILE VIEW ---------- */
@media (max-width: 768px) {

    .navbar ul {
        flex-direction: column;
        align-items: center;
    }

    .container {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
    }

    .products {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">New Order</a></li>
        <li><a href="#">My Orders</a></li>
        <li><a href="#">About Us</a></li>
    </ul>
</div>

<!-- MAIN CONTAINER -->
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>ABC Company</h3>
        <ul>
            <li>All Products</li>
            <li>Laptops</li>
            <li>Monitors</li>
            <li>Accessories</li>
            <li>Phones and Tablets</li>
        </ul>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <h2>All ABC Products</h2>

        <div class="products">
            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p3.webp?raw=true" height="200px" width="200px" /><figcaption>ABC W. Keyboard - Rs. 4,000.00</figcaption></figure>
            </div>

            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p4.webp?raw=true" height="200px" width="200px" /><figcaption>ABC Monitor - Rs. 30,000.00</figcaption></figure>    
            </div>

            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p5.webp?raw=true" height="200px" width="200px" /><figcaption>ABC Subwoofer - Rs. 40,000.00</figcaption></figure>
            </div>

            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p6.webp?raw=true" height="200px" width="200px" /><figcaption>ABC W. Headset - Rs. 9,500.00</figcaption></figure>    
            </div>

            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p7.webp?raw=true" height="200px" width="200px" /><figcaption>ABC Watch R1 - Rs. 20,000.00</figcaption></figure>
            </div>

            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p8.webp?raw=true" height="200px" width="200px" /><figcaption>ABC Lap Pro - Rs. 450,000.00</figcaption></figure>    
            </div>

            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p9.webp?raw=true" height="200px" width="200px" /><figcaption>ABC aPad 12 - Rs. 100,000.00</figcaption></figure>
            </div>

            <div class="product">
                <figure><figcaption><img src="https://github.com/charith-ac/ict2204-com2303-practicals/blob/main/Resources/ABC_p10.webp?raw=true" height="200px" width="200px" /><figcaption>ABC Lap Air - Rs. 250,000.00</figcaption></figure>    
            </div>
        </div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2024 ABC Company
</div>

</body>
</html>
